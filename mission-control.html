<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axiom Mission Control</title>
    <meta name="description" content="Dedicated Axiom Mission Control workspace." />
    <style>
      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #050816;
      }

      .mission-frame {
        display: block;
        width: 100%;
        min-height: 100vh;
        border: 0;
        background: #050816;
      }
    </style>
  </head>
  <body>
    <iframe class="mission-frame" src="index.html?admin=1#admin" title="Axiom Mission Control"></iframe>
    <script>
      (function () {
        const frame = document.querySelector(".mission-frame");
        const keyAliases = {
          axiomadmin2026: "AxiomAdmin2026!",
          "axiomadmin2026!": "AxiomAdmin2026!",
          axiomadmim2026: "AxiomAdmin2026!",
          "axiomadmim2026!": "AxiomAdmin2026!"
        };

        function normalizeKey(value) {
          return String(value || "").trim().replace(/\s+/g, "").toLowerCase();
        }

        function ensureStandaloneStyles(doc) {
          if (doc.getElementById("missionStandaloneStyles")) return;
          const style = doc.createElement("style");
          style.id = "missionStandaloneStyles";
          style.textContent = `
            header.hero,
            main > section:not(#analytics),
            .intake-overlay,
            .footer,
            .concierge-toggle,
            .concierge-panel {
              display: none !important;
            }
            body {
              background: #050816 !important;
            }
            main {
              padding: 24px 0 36px !important;
            }
            #analytics,
            #analytics.hidden {
              display: block !important;
            }
            #analytics.wrapper {
              width: min(1280px, calc(100% - 24px)) !important;
              max-width: 1280px !important;
            }
            #analytics .section-heading {
              margin-bottom: 0.85rem !important;
            }
            #analytics .section-heading h2 {
              font-size: clamp(1.65rem, 3vw, 2.25rem) !important;
            }
            #analytics .operations-workspace-head,
            #analytics .operations-tabs,
            #analytics .operations-tab-panel > .card {
              border-radius: 14px !important;
            }
            #analytics .analytics-grid {
              display: grid !important;
              grid-template-columns: repeat(auto-fit, minmax(132px, 1fr)) !important;
              gap: 0.6rem !important;
              align-items: stretch !important;
            }
            #analytics .analytics-grid .metric-card {
              min-height: 82px !important;
              padding: 0.72rem 0.78rem !important;
              border-radius: 12px !important;
              display: grid !important;
              grid-template-columns: minmax(0, 1fr) auto !important;
              grid-template-rows: auto 1fr !important;
              align-items: center !important;
              gap: 0.12rem 0.55rem !important;
              background:
                linear-gradient(145deg, rgba(9, 18, 35, 0.98), rgba(13, 24, 43, 0.9)),
                radial-gradient(circle at 0 0, rgba(34, 211, 238, 0.12), transparent 38%) !important;
              box-shadow: none !important;
              border-color: rgba(34, 211, 238, 0.2) !important;
            }
            #analytics .analytics-grid .metric-card h3 {
              grid-column: 1 / span 2 !important;
              margin: 0 !important;
              color: #dbeafe !important;
              font-size: 0.78rem !important;
              line-height: 1.15 !important;
              letter-spacing: 0 !important;
            }
            #analytics .analytics-grid .metric-card p {
              grid-column: 1 / span 2 !important;
              margin: 0 !important;
              color: #dffbff !important;
              font-size: clamp(1.25rem, 4.6vw, 1.72rem) !important;
              line-height: 1 !important;
              font-weight: 900 !important;
            }
            #analytics .overview-grid,
            #analytics .sprint-grid {
              grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)) !important;
              gap: 0.7rem !important;
            }
            #analytics .overview-card,
            #analytics .progress-desk-card,
            #analytics .risk-command-card {
              min-height: 86px !important;
              padding: 0.78rem !important;
              border-radius: 12px !important;
            }
            @media (max-width: 560px) {
              #analytics.wrapper {
                width: min(100% - 12px, 1280px) !important;
              }
              #analytics .analytics-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 0.5rem !important;
              }
              #analytics .analytics-grid .metric-card {
                min-height: 72px !important;
                padding: 0.62rem !important;
              }
            }
          `;
          doc.head.appendChild(style);
        }

        function showMissionTab(doc, key) {
          if (!key) return false;
          const tabs = Array.from(doc.querySelectorAll("[data-operations-tab]"));
          const panels = Array.from(doc.querySelectorAll("[data-operations-panel]"));
          if (!panels.length) return false;

          tabs.forEach(function (tab) {
            const isActive = tab.dataset.operationsTab === key;
            tab.classList.toggle("active", isActive);
            tab.setAttribute("aria-selected", isActive ? "true" : "false");
          });

          panels.forEach(function (panel) {
            const isActive = panel.dataset.operationsPanel === key;
            panel.classList.toggle("active", isActive);
            panel.classList.toggle("hidden", !isActive);
            panel.hidden = !isActive;
            panel.style.display = isActive ? "block" : "none";
          });

          const menu = doc.getElementById("operationsMoreMenu");
          const menuToggle = doc.getElementById("operationsMoreToggle");
          if (menu) menu.hidden = true;
          if (menuToggle) menuToggle.setAttribute("aria-expanded", "false");
          return true;
        }

        function installMissionTabs(doc) {
          const tabs = Array.from(doc.querySelectorAll("[data-operations-tab]"));
          const panels = Array.from(doc.querySelectorAll("[data-operations-panel]"));
          if (!tabs.length || !panels.length) return;

          tabs.forEach(function (tab) {
            if (tab.dataset.missionTabBound === "true") return;
            tab.dataset.missionTabBound = "true";
            tab.addEventListener(
              "click",
              function (event) {
                const key = tab.dataset.operationsTab;
                if (!key) return;
                event.preventDefault();
                event.stopImmediatePropagation();
                showMissionTab(doc, key);
              },
              true
            );
          });

          Array.from(doc.querySelectorAll("[data-open-operations-tab]")).forEach(function (button) {
            if (button.dataset.missionOpenTabBound === "true") return;
            button.dataset.missionOpenTabBound = "true";
            button.addEventListener(
              "click",
              function (event) {
                const key = button.dataset.openOperationsTab;
                if (!key) return;
                event.preventDefault();
                event.stopImmediatePropagation();
                showMissionTab(doc, key);
              },
              true
            );
          });

          const activeTab = tabs.find(function (tab) {
            return tab.classList.contains("active") || tab.getAttribute("aria-selected") === "true";
          });
          const activePanel = panels.find(function (panel) {
            return panel.classList.contains("active") && !panel.hidden && panel.style.display !== "none";
          });
          if (activeTab && (!activePanel || activePanel.dataset.operationsPanel !== activeTab.dataset.operationsTab)) {
            showMissionTab(doc, activeTab.dataset.operationsTab);
          }
        }

        function installKeyGuard(doc) {
          const gate = doc.getElementById("adminGate");
          const keyInput = doc.getElementById("adminPassword") || doc.getElementById("adminOtp");
          if (!gate || !keyInput || gate.dataset.parentKeyGuardReady === "true") return;
          gate.dataset.parentKeyGuardReady = "true";
          gate.addEventListener(
            "submit",
            function () {
              const corrected = keyAliases[normalizeKey(keyInput.value)];
              if (corrected) keyInput.value = corrected;
            },
            true
          );
        }

        function installMutationWatch(doc) {
          if (!doc.body || doc.body.dataset.missionMutationWatchReady === "true") return;
          const MutationObserver = doc.defaultView && doc.defaultView.MutationObserver;
          if (!MutationObserver) return;
          doc.body.dataset.missionMutationWatchReady = "true";
          const observer = new MutationObserver(function () {
            installMissionTabs(doc);
          });
          observer.observe(doc.body, { childList: true, subtree: true });
        }

        function prepareMissionFrame() {
          const doc = frame && frame.contentDocument;
          if (!doc || !doc.body || !doc.head) return;

          ensureStandaloneStyles(doc);
          const analytics = doc.getElementById("analytics");
          if (analytics) analytics.classList.remove("hidden");
          installKeyGuard(doc);
          installMissionTabs(doc);
          installMutationWatch(doc);

          if (doc.body.dataset.missionStandaloneScrolled !== "true") {
            doc.body.dataset.missionStandaloneScrolled = "true";
            setTimeout(function () {
              const anchor = doc.getElementById("admin") || analytics;
              if (anchor) anchor.scrollIntoView({ block: "start" });
            }, 50);
          }
        }

        frame.addEventListener("load", prepareMissionFrame);
        [150, 500, 1000, 2000, 3500].forEach(function (delay) {
          setTimeout(prepareMissionFrame, delay);
        });
      })();
    </script>
  </body>
</html>
