name: Apply deployment patch

on:
  issue_comment:
    types: [created]
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-deploy-patch.yml

permissions:
  contents: write
  issues: read

jobs:
  apply:
    if: github.event_name == 'push' || contains(github.event.comment.body, '/apply-axiom-deploy-patch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout live branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rebuild clean patch from issue comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const zlib = require('zlib');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue?.number || 1;
            const marker = 'AXIOM_DEPLOY_PATCH_V2_CHUNK';
            const expectedBase64Length = 74244;
            const expectedPatchBytes = 238169;
            core.info(`Reading clean deployment chunks from issue #${issue_number}.`);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const chunks = [];
            const ids = [];
            let expectedTotal = null;
            for (const comment of comments) {
              const match = comment.body.match(new RegExp(`${marker}\\s+(\\d+)\\/(\\d+)\\s*\\n\`\`\`base64\\n([\\s\\S]*?)\\n\`\`\``));
              if (!match) continue;
              const index = Number(match[1]);
              const total = Number(match[2]);
              expectedTotal = expectedTotal || total;
              if (total !== expectedTotal) throw new Error(`Chunk total mismatch: ${total} !== ${expectedTotal}`);
              chunks[index - 1] = match[3].replace(/\s+/g, '');
              ids[index - 1] = comment.id;
            }
            if (!expectedTotal) throw new Error(`No ${marker} chunks found.`);
            const missing = [];
            for (let i = 0; i < expectedTotal; i += 1) {
              if (!chunks[i]) missing.push(i + 1);
            }
            if (missing.length) throw new Error(`Missing clean patch chunk(s): ${missing.join(', ')}`);
            const bad = chunks
              .map((chunk, i) => ({ index: i + 1, length: chunk.length, id: ids[i] }))
              .filter(item => item.index < expectedTotal && item.length !== 6000);
            if (bad.length) throw new Error(`Bad chunk length(s): ${bad.map(item => `${item.index}=${item.length} comment ${item.id}`).join('; ')}`);
            const compressedText = chunks.join('');
            core.info(`Chunk lengths: ${chunks.map((chunk, i) => `${i + 1}=${chunk.length}`).join(', ')}`);
            if (compressedText.length !== expectedBase64Length) {
              throw new Error(`Clean payload length mismatch: expected ${expectedBase64Length}, got ${compressedText.length}`);
            }
            const patch = zlib.gunzipSync(Buffer.from(compressedText, 'base64'));
            if (patch.length !== expectedPatchBytes) {
              throw new Error(`Patch byte length mismatch: expected ${expectedPatchBytes}, got ${patch.length}`);
            }
            fs.writeFileSync('deploy-live.patch', patch);
            core.info(`Wrote clean deploy-live.patch (${patch.length} bytes).`);

      - name: Apply patch
        run: |
          git apply --check deploy-live.patch
          git apply deploy-live.patch
          rm deploy-live.patch

      - name: Install production dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci --omit=dev || npm install --omit=dev
          else
            npm install --omit=dev
          fi

      - name: Run syntax checks
        run: npm run check

      - name: Commit and push live update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Harden launch flow and polish UI"
          git push origin HEAD:main
