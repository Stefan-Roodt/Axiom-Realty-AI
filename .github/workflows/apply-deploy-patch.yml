name: Apply deployment patch

on:
  issue_comment:
    types: [created]
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-deploy-patch.yml

permissions:
  contents: write
  issues: read

jobs:
  apply:
    if: github.event_name == 'push' || contains(github.event.comment.body, '/apply-axiom-deploy-patch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout live branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rebuild compressed patch from issue comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const zlib = require('zlib');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue?.number || 1;
            core.info(`Reading deployment chunks from issue #${issue_number}.`);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const chunks = [];
            const commentIds = [];
            const partGroups = new Map();
            let expectedTotal = null;
            for (const comment of comments) {
              const full = comment.body.match(/AXIOM_DEPLOY_PATCH_GZ_CHUNK\s+(\d+)\/(\d+)\s*\n```base64\n([\s\S]*?)\n```/);
              if (full) {
                const index = Number(full[1]);
                const total = Number(full[2]);
                expectedTotal = expectedTotal || total;
                if (total !== expectedTotal) throw new Error(`Chunk total mismatch: ${total} !== ${expectedTotal}`);
                chunks[index - 1] = full[3].replace(/\s+/g, '');
                commentIds[index - 1] = comment.id;
                continue;
              }
              const part = comment.body.match(/AXIOM_DEPLOY_PATCH_GZ_SUBCHUNK\s+(\d+)\/(\d+)\s+(\d+)\/(\d+)\s*\n```base64\n([\s\S]*?)\n```/);
              if (!part) continue;
              const chunkIndex = Number(part[1]);
              const total = Number(part[2]);
              const partIndex = Number(part[3]);
              const partTotal = Number(part[4]);
              expectedTotal = expectedTotal || total;
              if (total !== expectedTotal) throw new Error(`Subchunk total mismatch: ${total} !== ${expectedTotal}`);
              const key = String(chunkIndex);
              if (!partGroups.has(key)) partGroups.set(key, { total: partTotal, parts: [], ids: [] });
              const group = partGroups.get(key);
              if (group.total !== partTotal) throw new Error(`Subchunk part total mismatch for chunk ${chunkIndex}`);
              group.parts[partIndex - 1] = part[5].replace(/\s+/g, '');
              group.ids[partIndex - 1] = comment.id;
            }
            for (const [key, group] of partGroups) {
              const missingParts = [];
              for (let i = 0; i < group.total; i += 1) {
                if (!group.parts[i]) missingParts.push(i + 1);
              }
              if (missingParts.length) throw new Error(`Missing subchunk part(s) for chunk ${key}: ${missingParts.join(', ')}`);
              const index = Number(key);
              chunks[index - 1] = group.parts.join('');
              commentIds[index - 1] = `subchunks ${group.ids.join(',')}`;
              core.info(`Overrode chunk ${index} from ${group.total} subchunks.`);
            }
            if (!expectedTotal) throw new Error('No compressed patch chunks found.');
            const missing = [];
            for (let i = 0; i < expectedTotal; i += 1) {
              if (!chunks[i]) missing.push(i + 1);
            }
            if (missing.length) throw new Error(`Missing patch chunk(s): ${missing.join(', ')}`);
            const expectedLengths = Array.from({ length: expectedTotal }, (_, i) => i === expectedTotal - 1 ? 1280 : 6000);
            const lengthReport = chunks.map((chunk, i) => `${i + 1}=${chunk.length} (${commentIds[i]})`).join(', ');
            core.info(`Chunk lengths: ${lengthReport}`);
            const wrongLengths = chunks
              .map((chunk, i) => ({ index: i + 1, actual: chunk.length, expected: expectedLengths[i], source: commentIds[i] }))
              .filter(item => item.actual !== item.expected);
            if (wrongLengths.length) {
              throw new Error(`Bad chunk length(s): ${wrongLengths.map(item => `${item.index} expected ${item.expected} got ${item.actual} source ${item.source}`).join('; ')}`);
            }
            const compressedText = chunks.join('');
            core.info(`Rebuilt ${expectedTotal} chunks (${compressedText.length} base64 chars).`);
            const compressed = Buffer.from(compressedText, 'base64');
            const patch = zlib.gunzipSync(compressed);
            fs.writeFileSync('deploy-live.patch', patch);
            core.info(`Wrote deploy-live.patch (${patch.length} bytes).`);

      - name: Apply patch
        run: |
          git apply --check deploy-live.patch
          git apply deploy-live.patch
          rm deploy-live.patch

      - name: Install production dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci --omit=dev || npm install --omit=dev
          else
            npm install --omit=dev
          fi

      - name: Run syntax checks
        run: npm run check

      - name: Commit and push live update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Harden launch flow and polish UI"
          git push origin HEAD:main
